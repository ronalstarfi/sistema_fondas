<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba PDF Básico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <h1>Prueba de Generación PDF</h1>
    <button onclick="generarPDF()">Generar PDF Básico</button>

    <script>
        async function generarPDF() {
            try {
                console.log('Iniciando generación de PDF...');

                // Simular datos del endpoint
                const data = {
                    periodo: "2024-01-01 - 2024-01-31",
                    frecuencia: "diario",
                    especialista_label: "Todos",
                    estatus_label: "Todos",
                    resumen: {
                        total: 150,
                        cerrados: 120,
                        pendientes: 30
                    }
                };

                console.log('Datos simulados:', data);

                // Crear PDF básico
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'pt', 'a4');
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 40;
                let y = 40;
                const maxWidth = pageWidth - margin * 2;

                const addText = (text, options = {}) => {
                    const lines = doc.splitTextToSize(text, maxWidth);
                    const lineHeight = options.lineHeight || 14;
                    lines.forEach((line) => {
                        if (y > pageHeight - 60) {
                            doc.addPage();
                            y = margin;
                            doc.setFontSize(options.fontSize || 10);
                        }
                        doc.text(line, margin, y);
                        y += lineHeight;
                    });
                };

                doc.setFontSize(16);
                doc.setFont('helvetica', 'bold');
                doc.text('INFORME DE GESTIÓN - FONDAS', margin, y);
                y += 24;
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                addText(`Periodo: ${data.periodo}`);
                addText(`Frecuencia: ${data.frecuencia.charAt(0).toUpperCase() + data.frecuencia.slice(1)}`);
                addText(`Especialista: ${data.especialista_label}`);
                addText(`Estatus: ${data.estatus_label}`);
                y += 8;

                addText('Resumen Ejecutivo', { fontSize: 12, lineHeight: 18 });
                addText(`Total de tickets: ${data.resumen.total}`);
                addText(`Casos resueltos: ${data.resumen.cerrados}`);
                addText(`Casos pendientes: ${data.resumen.pendientes}`);

                const fileName = `prueba_pdf_${new Date().toISOString().slice(0,10)}.pdf`;
                console.log('Guardando PDF:', fileName);
                doc.save(fileName);
                alert('PDF generado correctamente: ' + fileName);

            } catch (error) {
                console.error('Error al generar el PDF:', error);
                alert('Error al generar el informe: ' + error.message);
            }
        }
    </script>
</body>
</html>
