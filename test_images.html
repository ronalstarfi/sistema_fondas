<!DOCTYPE html>
<html>
<head>
    <title>Prueba de Imágenes</title>
</head>
<body>
    <h1>Prueba de Cintillos</h1>
    <img src="img/cintillo_superior.png" alt="Cintillo Superior" style="width: 100%; max-width: 600px;">
    <br><br>
    <img src="img/cintillo_inferior.png" alt="Cintillo Inferior" style="width: 100%; max-width: 600px;">
    <br><br>
    <button onclick="testImages()">Probar carga de imágenes</button>
    <div id="result"></div>

    <script>
        async function testImages() {
            const result = document.getElementById('result');
            result.innerHTML = 'Cargando imágenes...';

            try {
                const response1 = await fetch('img/cintillo_superior.png');
                const response2 = await fetch('img/cintillo_inferior.png');

                if (response1.ok && response2.ok) {
                    result.innerHTML = '✅ Ambas imágenes se cargaron correctamente';
                } else {
                    result.innerHTML = '❌ Error al cargar imágenes: ' + response1.status + ', ' + response2.status;
                }
            } catch (error) {
                result.innerHTML = '❌ Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
